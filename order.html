<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Pink Supermarket — Orders</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#e8446a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pink Orders">

<!-- Apple touch icons -->
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="144x144" href="icons/icon-144.png">
<link rel="apple-touch-icon" sizes="128x128" href="icons/icon-128.png">

<!-- Splash screen colour -->
<meta name="msapplication-TileColor" content="#e8446a">
<meta name="msapplication-TileImage" content="icons/icon-144.png">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
:root{
  --pink:#e8446a;--pink-l:#fde8ee;--pink-d:#b5274a;
  --green:#1a9e6e;--green-l:#e2f5ee;
  --red:#dc2626;--red-l:#fef2f2;
  --amber:#d97706;--amber-l:#fef3c7;
  --blue:#2563eb;--blue-l:#eff6ff;
  --g50:#f9f8f7;--g100:#f0eeec;--g200:#e2dfdb;
  --g300:#ccc9c3;--g400:#9e9b96;--g600:#5c5955;--g900:#1c1a18;
  --r:14px;--sh:0 1px 8px rgba(0,0,0,.08);
  --safe-bottom:env(safe-area-inset-bottom,16px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--g50);color:var(--g900);}

/* LOGIN */
#login-screen{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#fff5f7 0%,#f9f8f7 60%);}
.login-mark{width:64px;height:64px;border-radius:18px;background:var(--pink);display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
.login-mark svg{width:36px;height:36px;fill:white;}
.login-logo{font-size:22px;font-weight:700;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--g400);margin-bottom:32px;}
.login-card{background:white;border-radius:20px;box-shadow:0 4px 32px rgba(0,0,0,.1);padding:28px 24px;width:100%;max-width:360px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.field input{width:100%;height:48px;border:2px solid var(--g200);border-radius:12px;padding:0 16px;font-family:'DM Mono',monospace;font-size:15px;outline:none;color:var(--g900);background:var(--g50);transition:border-color .15s;}
.field input:focus{border-color:var(--pink);background:white;}
.login-btn{width:100%;height:52px;background:var(--pink);color:white;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;cursor:pointer;margin-top:4px;}
.login-btn:disabled{opacity:.5;}
.login-err{margin-top:12px;padding:12px;background:var(--red-l);border-radius:10px;font-size:13px;color:var(--red);text-align:center;display:none;}

/* APP */
#app{display:none;height:100vh;flex-direction:column;}
.topbar{background:white;border-bottom:1px solid var(--g100);height:56px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:20;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.back-btn{width:36px;height:36px;border-radius:10px;background:var(--g100);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--g600);}
.topbar-title{font-size:16px;font-weight:600;}
.topbar-sub{font-size:12px;color:var(--g400);margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.worker-pill{background:var(--g100);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:500;color:var(--g600);}
.so-btn{width:32px;height:32px;border-radius:8px;background:var(--g100);border:none;cursor:pointer;color:var(--g600);font-size:14px;display:flex;align-items:center;justify-content:center;}

/* CART FAB */
.cart-fab{
  position:fixed;bottom:calc(20px + var(--safe-bottom));right:16px;
  z-index:50;background:var(--pink);color:white;border:none;
  border-radius:28px;height:56px;padding:0 20px;
  display:none;align-items:center;gap:10px;
  box-shadow:0 4px 20px rgba(232,68,106,.4);
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;
}
.cart-fab.visible{display:flex;}
.cart-badge{
  background:white;color:var(--pink);
  border-radius:20px;padding:2px 8px;
  font-size:12px;font-weight:700;
}

/* SCREENS */
.screens{flex:1;overflow:hidden;position:relative;}
.screen{position:absolute;inset:0;overflow-y:auto;padding:16px 16px calc(var(--safe-bottom)+80px);transition:transform .28s cubic-bezier(.4,0,.2,1),opacity .28s;}
.screen.hidden-right{transform:translateX(100%);opacity:0;pointer-events:none;}
.screen.hidden-left{transform:translateX(-30%);opacity:0;pointer-events:none;}
.screen.active{transform:translateX(0);opacity:1;}

/* DATE STRIP */
.date-strip{background:linear-gradient(135deg,var(--pink) 0%,var(--pink-d) 100%);border-radius:var(--r);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.date-strip-day{font-size:20px;font-weight:700;color:white;}
.date-strip-full{font-size:12px;color:rgba(255,255,255,.75);margin-top:2px;}
.date-strip-pill{background:rgba(255,255,255,.2);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;color:white;}

/* SEARCH */
.search-wrap{background:var(--g50);padding:10px 16px;margin:-16px -16px 0;position:sticky;top:-16px;z-index:5;}
.search-rel{position:relative;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;color:var(--g400);}
.search-inp{width:100%;height:42px;border:2px solid var(--g200);border-radius:12px;padding:0 14px 0 36px;font-size:14px;outline:none;background:white;transition:border-color .15s;}
.search-inp:focus{border-color:var(--pink);}

/* BRAND GRID */
.brand-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px;}
.brand-card{background:white;border-radius:14px;box-shadow:var(--sh);padding:12px 8px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;border:2px solid transparent;cursor:pointer;transition:all .15s;position:relative;-webkit-user-select:none;user-select:none;}
.brand-card:active{transform:scale(.95);}
.brand-card.oos{border-color:var(--red);background:var(--red-l);}
.brand-card.order{border-color:var(--amber);background:var(--amber-l);}
.bc-badge{position:absolute;top:6px;right:6px;}
.bc-logo{width:72px;height:72px;border-radius:14px;overflow:hidden;background:var(--g100);border:1px solid var(--g200);display:flex;align-items:center;justify-content:center;}
.bc-logo img{width:100%;height:100%;object-fit:contain;}
.bc-name{font-size:12px;font-weight:700;text-align:center;line-height:1.3;}
/* cart dot on brand */
.brand-cart-dot{position:absolute;top:6px;left:6px;background:var(--green);color:white;border-radius:20px;font-size:10px;font-weight:700;padding:2px 6px;}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;}
.b-red{background:var(--red);color:white;}
.b-amber{background:var(--amber-l);color:var(--amber);}
.b-green{background:var(--green-l);color:var(--green);}
.b-gray{background:var(--g100);color:var(--g600);}

/* ITEMS SCREEN */
.item-card{background:white;border-radius:var(--r);box-shadow:var(--sh);margin-bottom:10px;overflow:hidden;}
.item-card.oos{border-left:4px solid var(--red);}
.item-card.low{border-left:4px solid var(--amber);}
.item-card.ok{border-left:4px solid var(--g200);}
.item-card.negative{border-left:4px solid var(--amber);}
.item-main{padding:12px 14px;display:flex;align-items:flex-start;gap:10px;}
.item-left{flex:1;min-width:0;}
.item-name{font-size:14px;font-weight:600;line-height:1.3;margin-bottom:4px;}
.item-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.item-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;}
.tag-oos{background:var(--red);color:white;}
.tag-low{background:var(--amber-l);color:var(--amber);}
.tag-ok{background:var(--green-l);color:var(--green);}
.tag-sync{background:var(--amber-l);color:var(--amber);}
.item-right{flex-shrink:0;}
.qty-ctrl{display:flex;align-items:center;border:2px solid var(--g200);border-radius:12px;overflow:hidden;background:var(--g50);}
.qbtn{width:40px;height:44px;border:none;background:transparent;font-size:22px;font-weight:300;color:var(--g600);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qbtn:active{background:var(--g200);}
.qinp{width:52px;height:44px;border:none;border-left:1.5px solid var(--g200);border-right:1.5px solid var(--g200);background:white;text-align:center;font-size:16px;font-weight:700;font-family:'DM Mono',monospace;outline:none;}
.add-cart-btn{width:100%;height:40px;background:var(--pink);color:white;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-top:6px;transition:opacity .15s;}
.add-cart-btn:active{opacity:.8;}
.add-cart-btn.in-cart{background:var(--green);}
.item-formula{padding:10px 14px 12px;background:var(--g50);border-top:1px solid var(--g100);font-size:12px;display:flex;flex-direction:column;gap:4px;}
.formula-row{display:flex;align-items:center;justify-content:space-between;}
.formula-label{color:var(--g400);}
.formula-val{font-weight:600;font-family:'DM Mono',monospace;font-size:12px;}
.formula-val.red{color:var(--red);}
.formula-val.amber{color:var(--amber);}
.formula-val.green{color:var(--green);}
.formula-val.blue{color:var(--blue);}
.formula-eq{font-size:11px;color:var(--g400);margin-top:2px;padding-top:6px;border-top:1px solid var(--g200);font-family:'DM Mono',monospace;line-height:1.5;}

/* CART SCREEN */
.cart-brand-section{margin-bottom:14px;}
.cart-brand-header{background:var(--pink-l);border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.cart-brand-name{font-size:14px;font-weight:700;color:var(--pink-d);}
.cart-brand-val{font-size:13px;font-weight:700;color:var(--pink);}
.cart-item-row{background:white;border-radius:10px;box-shadow:var(--sh);padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
.cart-item-name{flex:1;font-size:13px;font-weight:600;min-width:0;}
.cart-item-price{font-size:11px;color:var(--g400);margin-top:2px;}
.cart-qty-ctrl{display:flex;align-items:center;gap:6px;}
.cqbtn{width:32px;height:32px;border-radius:8px;border:2px solid var(--g200);background:var(--g50);font-size:18px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cqbtn:active{background:var(--g200);}
.cqval{width:36px;text-align:center;font-size:15px;font-weight:700;font-family:'DM Mono',monospace;}
.cart-remove{width:28px;height:28px;border-radius:50%;border:none;background:var(--red-l);color:var(--red);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* SUPPLIER SELECT (cart screen) */
.sup-select-section{background:white;border-radius:var(--r);box-shadow:var(--sh);padding:14px 16px;margin-bottom:14px;}
.sup-select-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--g400);margin-bottom:10px;}
.sup-card{border:2px solid var(--g200);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .15s;}
.sup-card:last-child{margin-bottom:0;}
.sup-card.selected{border-color:var(--pink);background:var(--pink-l);}
.sup-card:active{opacity:.8;}
.sup-name{font-size:14px;font-weight:700;}
.sup-meta{font-size:12px;color:var(--g400);margin-top:3px;}
.sup-last{font-size:12px;margin-top:4px;}
.sup-check{float:right;width:24px;height:24px;border-radius:50%;background:var(--pink);color:white;display:none;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
.sup-card.selected .sup-check{display:flex;}

/* ORDER TOTAL BAR */
.order-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:white;border-top:1px solid var(--g100);
  padding:12px 16px calc(12px + var(--safe-bottom));
  display:none;flex-direction:column;gap:8px;z-index:30;
  flex-shrink:0;
}
.order-bar.visible{display:flex;}
.order-bar-row{display:flex;align-items:center;justify-content:space-between;}
.order-bar-label{font-size:13px;color:var(--g400);}
.order-bar-total{font-size:18px;font-weight:700;}
.submit-btn{width:100%;height:50px;background:var(--pink);color:white;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;}
.submit-btn:disabled{opacity:.4;}

/* SHEET */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;}
.sheet-overlay.show{opacity:1;pointer-events:all;}
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;background:white;border-radius:24px 24px 0 0;z-index:101;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:80vh;overflow-y:auto;}
.bottom-sheet.show{transform:translateY(0);}
.sheet-handle{width:40px;height:4px;background:var(--g200);border-radius:2px;margin:12px auto 0;}
.sheet-header{padding:14px 20px 10px;border-bottom:1px solid var(--g100);}
.sheet-title{font-size:16px;font-weight:700;}
.sheet-sub{font-size:12px;color:var(--g400);margin-top:2px;}
.sheet-body{padding:14px 20px;}

/* ORDER HISTORY CARDS */
.ord-card{background:white;border-radius:var(--r);box-shadow:var(--sh);padding:14px 16px;margin-bottom:10px;}
.ord-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.ord-po{font-size:12px;font-weight:700;color:var(--g900);font-family:'DM Mono',monospace;}
.ord-date{font-size:11px;color:var(--g400);margin-top:2px;}
.ord-val{font-size:16px;font-weight:700;color:var(--pink);}
.ord-meta{font-size:12px;color:var(--g600);margin-bottom:10px;}
.ord-pdf-btn{width:100%;height:40px;background:var(--pink-l);color:var(--pink);border:2px solid var(--pink-l);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.ord-pdf-btn:active{opacity:.8;}

/* MISC */
.sec-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--g400);margin:12px 0 8px;}
.lrow{display:flex;align-items:center;justify-content:center;gap:8px;padding:40px 16px;color:var(--g400);font-size:13px;}
.sp{width:18px;height:18px;border:2px solid var(--g200);border-top-color:var(--pink);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 20px;color:var(--g400);font-size:14px;line-height:1.8;}
.toast{position:fixed;bottom:calc(90px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:var(--g900);color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-mark"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
  <div class="login-logo">Pink Supermarket</div>
  <div class="login-sub">Worker Order Portal · v7</div>
  <div class="login-card">
    <div class="field"><label>Username</label><input type="text" id="l-user" placeholder="username" autocomplete="username" autocapitalize="none"></div>
    <div class="field"><label>Password</label><input type="password" id="l-pass" placeholder="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="login-btn" id="l-btn" onclick="doLogin()">Sign in</button>
    <div class="login-err" id="l-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar" id="topbar">
    <div class="topbar-left">
      <button class="back-btn" id="back-btn" onclick="goBack()" style="display:none">‹</button>
      <div><div class="topbar-title" id="topbar-title">Order Brands</div><div class="topbar-sub" id="topbar-sub"></div></div>
    </div>
    <div class="topbar-right">
      <div class="worker-pill" id="worker-pill"></div>
      <button class="so-btn" title="My Orders" onclick="goOrders()" style="font-size:16px">📋</button>
      <button class="so-btn" id="install-btn" title="Install App" onclick="handleInstall()" style="font-size:16px;display:none">⬇️</button>
      <button class="so-btn" onclick="doLogout()">⏻</button>
    </div>
  </div>

  <div class="screens">
    <!-- S1: BRAND GRID -->
    <div class="screen active" id="s-brands">
      <div class="date-strip">
        <div><div class="date-strip-day" id="strip-day"></div><div class="date-strip-full" id="strip-date"></div></div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="date-strip-pill" id="strip-badge">Loading...</div>
          <button onclick="loadBrands()" style="background:rgba(255,255,255,.2);border:none;border-radius:20px;padding:4px 10px;color:white;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif" title="Refresh brands">↻</button>
        </div>
      </div>
      <div class="search-wrap">
        <div class="search-rel">
          <span class="search-icon">🔍</span>
          <input class="search-inp" id="brand-search" placeholder="Search brand..." oninput="renderBrands(this.value)" autocomplete="off">
        </div>
      </div>
      <div id="brand-body"><div class="lrow"><div class="sp"></div></div></div>
    </div>

    <!-- S2: ITEMS (browse + add to cart) -->
    <div class="screen hidden-right" id="s-items">
      <div id="items-body"><div class="lrow"><div class="sp"></div></div></div>
      <div style="height:80px"></div>
    </div>

    <!-- S3: CART -->
    <div class="screen hidden-right" id="s-cart">
      <div id="cart-body"><div class="empty">Your cart is empty.<br>Browse brands and add items.</div></div>
      <div style="height:100px"></div>
    </div>

    <!-- S4: SUBMITTED ORDERS -->
    <div class="screen hidden-right" id="s-orders">
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--g400);margin-bottom:12px">My submitted orders</div>
      <div id="orders-list-body"><div class="lrow"><div class="sp"></div></div></div>
      <div style="height:80px"></div>
    </div>
  </div>

  <!-- Cart FAB -->
  <button class="cart-fab" id="cart-fab" onclick="goCart()">
    🛒 Cart
    <span class="cart-badge" id="cart-badge">0</span>
    <span id="cart-fab-total" style="font-size:13px;opacity:.9">₹0</span>
  </button>

  <!-- Order bar (in cart screen) -->
  <div class="order-bar" id="order-bar">
    <div class="order-bar-row">
      <span class="order-bar-label">Cart total</span>
      <span class="order-bar-total" id="order-bar-total">₹0</span>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitOrder()">Submit Order</button>
  </div>
</div>

<!-- Supplier select sheet -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
<div class="bottom-sheet" id="bottom-sheet">
  <div class="sheet-handle"></div>
  <div id="sheet-content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL  = 'https://gllmdqytlgcozrpsusvt.supabase.co';
const SB_ANON = 'sb_publishable_unOW9_eUhaPki59JWbccgA_Pg4nflGS';
const H  = {'apikey':SB_ANON,'Authorization':'Bearer '+SB_ANON};
const HP = {'apikey':SB_ANON,'Authorization':'Bearer '+SB_ANON,'Content-Type':'application/json'};

let worker=null, allBrands=[], currentBrand=null, currentBrandItems=[];
let coverDays=14, avgMonths=3;  // user-configurable per session
let cart={};  // { item_id: {item, qty, brand_name} }
let allSuppliers=[];
let selectedSupplier=null;
let screenStack=['s-brands'];

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function doLogin(){
  const u=document.getElementById('l-user').value.trim().toLowerCase();
  const p=document.getElementById('l-pass').value;
  const err=document.getElementById('l-err'),btn=document.getElementById('l-btn');
  if(!u||!p){err.style.display='block';err.textContent='Enter username and password';return;}
  err.style.display='none';btn.disabled=true;btn.textContent='Signing in...';
  try{
    const r=await fetch(`${SB_URL}/functions/v1/worker-login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(!r.ok||d.error){err.textContent=d.error==='Invalid credentials'?'Incorrect username or password':'Error: '+(d.error||r.status);err.style.display='block';btn.disabled=false;btn.textContent='Sign in';return;}
    worker=d.worker;localStorage.setItem('pk_worker',JSON.stringify(worker));startApp();
  }catch(e){err.textContent='Connection error. Try again.';err.style.display='block';btn.disabled=false;btn.textContent='Sign in';}
}
function doLogout(){worker=null;localStorage.removeItem('pk_worker');document.getElementById('app').style.display='none';document.getElementById('login-screen').style.display='flex';document.getElementById('l-pass').value='';}
function startApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('worker-pill').textContent=worker.full_name||worker.username;
  const now=new Date();
  document.getElementById('strip-day').textContent=now.toLocaleDateString('en-IN',{weekday:'long'});
  document.getElementById('strip-date').textContent=now.toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  loadBrands();
  loadSuppliers();
}
const saved=localStorage.getItem('pk_worker');
if(saved){try{worker=JSON.parse(saved);}catch{}}
if(worker)window.addEventListener('DOMContentLoaded',startApp);

// ── HELPERS ───────────────────────────────────────────────────────────────────
const fmtINR=n=>'₹'+Math.round(n||0).toLocaleString('en-IN');
function showToast(msg,dur=2200){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}

// ── NAV ───────────────────────────────────────────────────────────────────────
function navigate(toId){
  const from=screenStack[screenStack.length-1];
  document.getElementById(from).classList.remove('active');document.getElementById(from).classList.add('hidden-left');
  document.getElementById(toId).classList.remove('hidden-right','hidden-left');document.getElementById(toId).classList.add('active');
  screenStack.push(toId);updateTopbar();
}
function goBack(){
  if(screenStack.length<=1)return;
  const from=screenStack.pop(),to=screenStack[screenStack.length-1];
  document.getElementById(from).classList.remove('active');document.getElementById(from).classList.add('hidden-right');
  document.getElementById(to).classList.remove('hidden-left','hidden-right');document.getElementById(to).classList.add('active');
  updateTopbar();
  if(to==='s-brands') renderBrands(document.getElementById('brand-search').value);
  if(to==='s-cart'){document.getElementById('order-bar').classList.add('visible');document.getElementById('cart-fab').classList.remove('visible');}
  else{document.getElementById('order-bar').classList.remove('visible');updateCartFab();}
}
function updateTopbar(){
  const cur=screenStack[screenStack.length-1];
  document.getElementById('back-btn').style.display=screenStack.length>1?'flex':'none';
  if(cur==='s-brands'){document.getElementById('topbar-title').textContent='Order Brands';document.getElementById('topbar-sub').textContent='';}
  else if(cur==='s-items'){document.getElementById('topbar-title').textContent=currentBrand||'Items';document.getElementById('topbar-sub').textContent='Tap + to add to cart';}
  else if(cur==='s-cart'){document.getElementById('topbar-title').textContent='Your Cart';document.getElementById('topbar-sub').textContent=cartCount()+' items';}
  else if(cur==='s-orders'){document.getElementById('topbar-title').textContent='My Orders';document.getElementById('topbar-sub').textContent='';}
}

// ── SUPPLIERS ─────────────────────────────────────────────────────────────────
async function loadSuppliers(){
  const r=await fetch(`${SB_URL}/rest/v1/suppliers?is_active=eq.true&select=id,supplier_name,whatsapp_number,visit_days,cover_weeks`,{headers:H});
  allSuppliers=await r.json().catch(()=>[]);
  // Fetch last order for each supplier
  for(const s of allSuppliers){
    const lr=await fetch(`${SB_URL}/rest/v1/order_sessions?supplier_id=eq.${s.id}&status=eq.submitted&order=session_date.desc&limit=1&select=session_date,total_value`,{headers:H});
    const ld=await lr.json().catch(()=>[]);
    s.last_date=ld[0]?.session_date||null;
    s.last_value=ld[0]?.total_value||null;
  }
}

// ── BRANDS ────────────────────────────────────────────────────────────────────
async function loadBrands(){
  document.getElementById('brand-body').innerHTML='<div class="lrow"><div class="sp"></div></div>';
  const r=await fetch(`${SB_URL}/rest/v1/rpc/get_brands_for_order`,{method:'POST',headers:HP,body:'{}',cache:'no-store'});
  if(!r.ok){document.getElementById('brand-body').innerHTML='<div class="empty">Error loading.<br><button onclick="loadBrands()" style="margin-top:8px;padding:8px 20px;background:var(--pink);color:white;border:none;border-radius:8px;cursor:pointer">↻ Retry</button></div>';return;}
  allBrands=await r.json().catch(()=>[]);
  const oosB=allBrands.filter(b=>Number(b.oos_count||0)>0).length;
  const ordB=allBrands.filter(b=>Number(b.oos_count||0)===0&&Number(b.needs_order_count||0)>0).length;
  document.getElementById('strip-badge').textContent=oosB>0?`${oosB} brand${oosB>1?'s':''} need stock`:ordB>0?`${ordB} brand${ordB>1?'s':''} need order`:'All brands stocked ✓';
  renderBrands('');
}

function renderBrands(q){
  const query=(q||'').toLowerCase().trim();
  const filtered=query?allBrands.filter(b=>b.brand_name.toLowerCase().includes(query)):allBrands;
  if(!filtered.length){document.getElementById('brand-body').innerHTML='<div class="empty" style="padding-top:32px">No brands match.</div>';return;}
  const sorted=[
    ...filtered.filter(b=>Number(b.oos_count||0)>0),
    ...filtered.filter(b=>Number(b.oos_count||0)===0&&Number(b.needs_order_count||0)>0),
    ...filtered.filter(b=>Number(b.oos_count||0)===0&&Number(b.needs_order_count||0)===0),
  ];
  // Count cart items per brand
  const cartPerBrand={};
  Object.values(cart).forEach(ci=>{cartPerBrand[ci.brand_name]=(cartPerBrand[ci.brand_name]||0)+1;});

  let html='<div class="brand-grid">';
  html+=sorted.map(b=>{
    const oos=Number(b.oos_count||0)>0,order=!oos&&Number(b.needs_order_count||0)>0;
    const cls=oos?'oos':order?'order':'';
    let badge='';
    if(oos) badge=`<span class="badge b-red bc-badge" style="font-size:10px;padding:2px 6px">${b.oos_count} OUT</span>`;
    else if(order) badge=`<span class="badge b-amber bc-badge" style="font-size:10px;padding:2px 6px">${b.needs_order_count}</span>`;
    const inCart=cartPerBrand[b.brand_name]||0;
    const cartDot=inCart>0?`<span class="brand-cart-dot">${inCart}</span>`:'';
    return `<div class="brand-card ${cls}" onclick="openBrand('${b.brand_name.replace(/'/g,"\\'")}')">
      ${badge}${cartDot}
      <div class="bc-logo"><img src="${b.logo_url}" onerror="this.parentElement.innerHTML='<div style=&quot;font-size:11px;font-weight:700;color:var(--g400);text-align:center;padding:4px&quot;>${b.brand_name.slice(0,3)}</div>'"></div>
      <div class="bc-name">${b.brand_name}</div>
    </div>`;
  }).join('');
  html+='</div>';
  document.getElementById('brand-body').innerHTML=html;
}

async function startBrowseBrand(){
  navigate('s-items');
  document.getElementById('items-body').innerHTML='<div class="lrow"><div class="sp"></div></div>';
  const r=await fetch(`${SB_URL}/rest/v1/rpc/get_brand_items_for_order`,{
    method:'POST',headers:HP,
    body:JSON.stringify({p_brand_name:currentBrand,p_cover_days:coverDays})
  });
  const items=await r.json().catch(()=>[]);
  currentBrandItems=items;
  if(!items.length){
    document.getElementById('items-body').innerHTML='<div class="empty">No items found for this brand.</div>';
    return;
  }
  renderBrandItems();
  updateCartFab();
}

function renderBrandItems(){
  const toOrder=currentBrandItems.filter(i=>Number(i.suggested_qty||0)>0);
  const stocked=currentBrandItems.filter(i=>Number(i.suggested_qty||0)===0&&Number(i.stock||0)>0);
  const noSales=currentBrandItems.filter(i=>Number(i.suggested_qty||0)===0&&Number(i.stock||0)<=0);
  let html='';
  if(toOrder.length){html+=`<div class="sec-label">Needs order (${toOrder.length})</div>`;html+=toOrder.map(itemCard).join('');}
  if(stocked.length){html+=`<div class="sec-label">Well stocked</div>`;html+=stocked.map(itemCard).join('');}
  if(noSales.length){html+=`<div class="sec-label">No recent sales</div>`;html+=noSales.map(itemCard).join('');}
  document.getElementById('items-body').innerHTML=html||'<div class="empty">No items</div>';
}

function itemCard(item){
  const ss=item.stock_status||(Number(item.stock)<0?'negative':Number(item.stock)===0?'zero':'ok');
  const stock=Number(item.stock||0);
  const oos=stock<=0;
  const daily=Number(item.daily_avg||0);
  const sales7d=Number(item.sold_7d||0);
  const suggested=Number(item.suggested_qty||0);
  const minQty=Number(item.min_order_qty||1);
  const orderType=item.order_type||'unit';
  const unitLabel=item.unit_label||'unit';
  const unitsPack=Number(item.units_per_pack||1);
  const packLabel=item.pack_label||'box';
  const inCart=cart[item.item_id];
  // Default qty = max(suggested, min_order_qty)
  const defaultQty=inCart?inCart.qty:Math.max(suggested,suggested>0?minQty:0);
  const qty=defaultQty;

  let stockTag='';
  if(ss==='negative') stockTag=`<span class="item-tag tag-sync">⚠ Stock ${stock}</span>`;
  else if(oos) stockTag=`<span class="item-tag tag-oos">Out of stock</span>`;
  else{
    const dlNum=daily>0?stock/daily:999;
    const dlStr=dlNum>=999?'∞':dlNum.toFixed(0)+'d';
    stockTag=dlNum<7?`<span class="item-tag tag-low">${dlStr} left</span>`:`<span class="item-tag tag-ok">${dlStr} left</span>`;
  }
  const lineTotal=qty*Number(item.purchase_price||0);
  const cls=ss==='negative'?'negative':oos?'oos':Number(item.suggested_qty||0)>0?'low':'ok';
  const btnCls=inCart?'in-cart':'';
  const btnTxt=inCart?`✓ In cart — ${fmtINR(lineTotal)}`:'+ Add to cart';

  return `<div class="item-card ${cls}" id="ic-${item.item_id}">
    <div class="item-main">
      <div class="item-left">
        <div class="item-name">${item.item_name}</div>
        <div class="item-tags">
          ${stockTag}
          <span class="item-tag" style="background:var(--g100);color:var(--g600)">₹${Number(item.purchase_price||0).toFixed(2)}</span>
          ${item.supplier_name?`<span class="item-tag" style="background:var(--blue-l);color:var(--blue)">${item.supplier_name}</span>`:''}
        </div>
      </div>
      <div class="item-right">
        <div class="qty-ctrl">
          <button class="qbtn" onclick="changeQty(${item.item_id},-1)">−</button>
          <input class="qinp" id="qi-${item.item_id}" type="number" min="0" value="${qty}" onchange="setQty(${item.item_id},this.value)" oninput="setQty(${item.item_id},this.value)">
          <button class="qbtn" onclick="changeQty(${item.item_id},1)">+</button>
        </div>
      </div>
    </div>
    <div style="padding:0 14px 12px">
      <button class="add-cart-btn ${btnCls}" id="cb-${item.item_id}" onclick="toggleCart(${item.item_id})">${btnTxt}</button>
    </div>
    <div class="item-formula">
      <div class="formula-row"><span class="formula-label">7-day sales</span><span class="formula-val ${sales7d>0?'green':'red'}">${sales7d} units</span></div>
      <div class="formula-row"><span class="formula-label">Daily avg</span><span class="formula-val">${daily.toFixed(2)}/day</span></div>
      <div class="formula-row"><span class="formula-label">Stock</span><span class="formula-val ${ss==='negative'?'amber':oos?'red':''}">${stock}${ss==='negative'?' ⚠':''}</span></div>
      <div class="formula-eq">${daily.toFixed(2)}/day × ${coverDays}d = ${Number(item.target_stock||0).toFixed(0)} target → suggest <strong>${suggested} ${unitLabel}</strong>${minQty>1?` · min order ${minQty}`:''}</div>
    </div>
  </div>`;
}

// ── CART LOGIC ────────────────────────────────────────────────────────────────
function cartCount(){return Object.values(cart).filter(c=>c.qty>0).length;}
function cartTotal(){return Object.values(cart).reduce((s,c)=>s+c.qty*Number(c.item.purchase_price||0),0);}

function toggleCart(itemId){
  const item=currentBrandItems.find(i=>i.item_id===itemId);
  if(!item)return;
  const inp=document.getElementById(`qi-${itemId}`);
  const qty=Math.max(0,parseInt(inp?.value||0)||0);
  if(cart[itemId]){
    // Remove from cart
    delete cart[itemId];
    showToast(`${item.item_name} removed from cart`);
  } else {
    if(qty===0){showToast('Set quantity first');return;}
    cart[itemId]={item,qty,brand_name:currentBrand};
    showToast(`Added ${qty} × ${item.item_name}`);
  }
  refreshItemCard(itemId);
  updateCartFab();
  renderBrands(document.getElementById('brand-search').value||'');
}

function changeQty(itemId,delta){
  const inp=document.getElementById(`qi-${itemId}`);
  if(!inp)return;
  const newVal=Math.max(0,(parseInt(inp.value)||0)+delta);
  inp.value=newVal;
  setQty(itemId,newVal);
}
function setQty(itemId,val){
  const qty=Math.max(0,parseInt(val)||0);
  if(cart[itemId]){
    if(qty===0){delete cart[itemId];showToast('Removed from cart');}
    else cart[itemId].qty=qty;
    refreshItemCard(itemId);
    updateCartFab();
  }
}

function refreshItemCard(itemId){
  const item=currentBrandItems.find(i=>i.item_id===itemId);
  if(!item)return;
  const ci=cart[itemId];
  const qty=ci?ci.qty:Number(item.suggested_qty||0);
  const inp=document.getElementById(`qi-${itemId}`);
  if(inp)inp.value=qty;
  const btn=document.getElementById(`cb-${itemId}`);
  if(btn){
    const lineTotal=qty*Number(item.purchase_price||0);
    if(ci){btn.textContent=`✓ In cart — ${fmtINR(lineTotal)}`;btn.classList.add('in-cart');}
    else{btn.textContent='+ Add to cart';btn.classList.remove('in-cart');}
  }
}

function updateCartFab(){
  const count=cartCount(),total=cartTotal();
  const fab=document.getElementById('cart-fab');
  const cur=screenStack[screenStack.length-1];
  if(count>0&&cur!=='s-cart'){fab.classList.add('visible');}
  else{fab.classList.remove('visible');}
  document.getElementById('cart-badge').textContent=count;
  document.getElementById('cart-fab-total').textContent=fmtINR(total);
}

// ── CART SCREEN ───────────────────────────────────────────────────────────────
function goCart(){
  navigate('s-cart');
  document.getElementById('cart-fab').classList.remove('visible');
  document.getElementById('order-bar').classList.add('visible');
  renderCart();
}

function renderCart(){
  const items=Object.values(cart).filter(c=>c.qty>0);
  if(!items.length){
    document.getElementById('cart-body').innerHTML='<div class="empty">Your cart is empty.<br>Go back and add items.</div>';
    document.getElementById('order-bar').classList.remove('visible');
    return;
  }

  // Group by brand
  const byBrand={};
  items.forEach(c=>{if(!byBrand[c.brand_name])byBrand[c.brand_name]=[];byBrand[c.brand_name].push(c);});

  let html='';

  // Supplier selection
  html+=`<div class="sup-select-section">
    <div class="sup-select-title">Select supplier for this order</div>`;
  if(!allSuppliers.length){
    html+=`<div style="font-size:13px;color:var(--g400)">Loading suppliers...</div>`;
  } else {
    html+=allSuppliers.map(s=>{
      const isSelected=selectedSupplier&&selectedSupplier.id===s.id;
      const days=['','Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      const visitStr=(s.visit_days||[]).map(d=>days[d]).join(', ');
      return `<div class="sup-card ${isSelected?'selected':''}" onclick="pickSupplier(${s.id})">
        <div class="sup-check">✓</div>
        <div class="sup-name">${s.supplier_name}</div>
        <div class="sup-meta">${s.whatsapp_number||'—'} · Visit: ${visitStr}</div>
        ${s.last_date
          ? `<div class="sup-last">Last bill: <strong>${s.last_date}</strong> · <strong style="color:var(--pink)">${fmtINR(s.last_value)}</strong></div>`
          : `<div class="sup-last" style="color:var(--g400)">No orders yet</div>`}
      </div>`;
    }).join('');
  }
  html+='</div>';

  // Items by brand
  Object.entries(byBrand).forEach(([brand,citems])=>{
    const brandTotal=citems.reduce((s,c)=>s+c.qty*Number(c.item.purchase_price||0),0);
    html+=`<div class="cart-brand-section">
      <div class="cart-brand-header">
        <div class="cart-brand-name">${brand}</div>
        <div class="cart-brand-val">${fmtINR(brandTotal)}</div>
      </div>`;
    citems.forEach(c=>{
      const lineTotal=c.qty*Number(c.item.purchase_price||0);
      html+=`<div class="cart-item-row" id="cir-${c.item.item_id}">
        <div style="flex:1;min-width:0">
          <div class="cart-item-name" title="${c.item.item_name}">${c.item.item_name}</div>
          <div class="cart-item-price">₹${Number(c.item.purchase_price||0).toFixed(2)} × ${c.qty} = ${fmtINR(lineTotal)}</div>
        </div>
        <div class="cart-qty-ctrl">
          <button class="cqbtn" onclick="cartChange(${c.item.item_id},-1)">−</button>
          <div class="cqval" id="cqv-${c.item.item_id}">${c.qty}</div>
          <button class="cqbtn" onclick="cartChange(${c.item.item_id},1)">+</button>
        </div>
        <button class="cart-remove" onclick="cartRemove(${c.item.item_id})">×</button>
      </div>`;
    });
    html+='</div>';
  });

  document.getElementById('cart-body').innerHTML=html;
  updateOrderBar();
}

function pickSupplier(supId){
  selectedSupplier=allSuppliers.find(s=>s.id===supId)||null;
  // Update UI — toggle selected class
  document.querySelectorAll('.sup-card').forEach(el=>el.classList.remove('selected'));
  const cards=document.querySelectorAll('.sup-card');
  // Find the clicked card by iterating
  allSuppliers.forEach((s,i)=>{
    if(s.id===supId&&cards[i]) cards[i].classList.add('selected');
  });
  updateOrderBar();
}

function cartChange(itemId,delta){
  if(!cart[itemId])return;
  const newQty=Math.max(0,cart[itemId].qty+delta);
  if(newQty===0){cartRemove(itemId);return;}
  cart[itemId].qty=newQty;
  const el=document.getElementById(`cqv-${itemId}`);
  if(el)el.textContent=newQty;
  updateOrderBar();
  updateCartFab();
}
function cartRemove(itemId){
  delete cart[itemId];
  renderCart();
  updateCartFab();
  if(!cartCount()){document.getElementById('order-bar').classList.remove('visible');}
}

function updateOrderBar(){
  const total=cartTotal();
  document.getElementById('order-bar-total').textContent=fmtINR(total);
  document.getElementById('submit-btn').disabled=!selectedSupplier||cartCount()===0;
}

// ── SUBMIT ────────────────────────────────────────────────────────────────────
async function submitOrder(){
  if(!selectedSupplier){showToast('Please select a supplier');return;}
  const items=Object.values(cart).filter(c=>c.qty>0);
  if(!items.length){showToast('Cart is empty');return;}
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='Submitting...';

  const today=new Date().toISOString().slice(0,10);
  const poNum=`PO-${today.replace(/-/g,'')}-${Math.floor(Math.random()*900)+100}`;
  const total=cartTotal();

  const sr=await fetch(`${SB_URL}/rest/v1/order_sessions`,{
    method:'POST',headers:{...HP,'Prefer':'return=representation,resolution=merge-duplicates'},
    body:JSON.stringify({
      session_date:today,supplier_id:selectedSupplier.id,
      supplier_name:selectedSupplier.supplier_name,
      submitted_by:worker.full_name||worker.username,
      status:'submitted',total_items:items.length,
      total_value:Math.round(total),po_number:poNum,
      submitted_at:new Date().toISOString()
    })
  });
  const sess=await sr.json();
  const sessId=Array.isArray(sess)?sess[0]?.id:sess?.id;
  if(!sessId){btn.disabled=false;btn.textContent='Submit Order';showToast('Error. Try again.');return;}

  await fetch(`${SB_URL}/rest/v1/order_session_items`,{
    method:'POST',headers:HP,
    body:JSON.stringify(items.map(c=>({
      session_id:sessId,item_id:c.item.item_id,item_name:c.item.item_name,
      brand:c.brand_name,current_stock:c.item.stock,
      daily_avg:c.item.daily_avg,sales_7d:c.item.sold_7d||0,
      suggested_qty:c.item.suggested_qty||0,ordered_qty:c.qty,
      units_per_pack:1,order_type:'unit',pack_label:'unit',
      purchase_price:c.item.purchase_price,
      line_total:Math.round(c.qty*Number(c.item.purchase_price||0))
    })))
  });

  btn.textContent='Sending PDF...';
  try{
    const pdfRes=await fetch(`${SB_URL}/functions/v1/generate-order-pdf`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({session_id:sessId,worker_mobile:worker.mobile_number||null})
    });
    const pd=await pdfRes.json();
    if(pd.pdf_url)setTimeout(()=>window.open(pd.pdf_url,'_blank'),400);
    showToast(`✓ Order submitted · PDF sent`);
  }catch{showToast(`Order submitted — ${poNum}`);}

  // Reset
  cart={};selectedSupplier=null;
  setTimeout(()=>{
    btn.disabled=false;btn.textContent='Submit Order';
    screenStack=['s-brands'];
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active','hidden-left','hidden-right'));
    document.getElementById('s-brands').classList.add('active');
    document.getElementById('s-items').classList.add('hidden-right');
    document.getElementById('s-cart').classList.add('hidden-right');
    document.getElementById('s-orders').classList.add('hidden-right');
    document.getElementById('order-bar').classList.remove('visible');
    document.getElementById('cart-fab').classList.remove('visible');
    updateTopbar();loadBrands();
  },1800);
}

// ── ORDERS HISTORY ────────────────────────────────────────────────────────────
function goOrders(){
  navigate('s-orders');
  loadMyOrders();
}

async function loadMyOrders(){
  const body=document.getElementById('orders-list-body');
  body.innerHTML='<div class="lrow"><div class="sp"></div></div>';
  const name=encodeURIComponent(worker.full_name||worker.username);
  const r=await fetch(`${SB_URL}/rest/v1/order_sessions?submitted_by=eq.${name}&status=eq.submitted&order=submitted_at.desc&limit=30&select=id,po_number,session_date,supplier_name,brand,total_items,total_value,submitted_at`,{headers:H});
  const orders=await r.json().catch(()=>[]);
  if(!orders.length){
    body.innerHTML='<div class="empty">No orders yet.<br>Browse brands and submit your first order.</div>';
    return;
  }
  body.innerHTML=orders.map(o=>{
    const val=o.total_value?'₹'+Math.round(o.total_value).toLocaleString('en-IN'):'—';
    return `<div class="ord-card">
      <div class="ord-card-top">
        <div>
          <div class="ord-po">${o.po_number||'Order #'+o.id}</div>
          <div class="ord-date">${o.session_date||''} · ${o.supplier_name||'—'}</div>
          <div class="ord-meta">${o.brand||'—'} · ${o.total_items||0} items</div>
        </div>
        <div class="ord-val">${val}</div>
      </div>
      <button class="ord-pdf-btn" onclick="downloadOrderPDF(${o.id},this)">
        📄 Download PDF for purchase entry
      </button>
    </div>`;
  }).join('');
}

async function downloadOrderPDF(sessionId,btn){
  const orig=btn.textContent;
  btn.disabled=true;btn.textContent='Generating PDF...';
  try{
    const r=await fetch(`${SB_URL}/functions/v1/generate-order-pdf`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({session_id:sessionId,worker_mobile:null})
    });
    const d=await r.json();
    if(d.pdf_url){window.open(d.pdf_url,'_blank');btn.textContent='✓ Opened';}
    else{btn.textContent='Failed — try again';}
  }catch(e){btn.textContent='Error';}
  setTimeout(()=>{btn.disabled=false;btn.textContent=orig;},3000);
}

// ── SHEET ─────────────────────────────────────────────────────────────────────
function closeSheet(){document.getElementById('sheet-overlay').classList.remove('show');document.getElementById('bottom-sheet').classList.remove('show');}


// ── PWA ───────────────────────────────────────────────────────────────────────
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.matchMedia('(display-mode: standalone)').matches
  || window.navigator.standalone === true;
let deferredPrompt = null;

// Register service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js', {scope: './'})
      .then(reg => { console.log('[SW] Scope:', reg.scope); reg.update(); })
      .catch(err => console.warn('[SW] Failed:', err));
  });
}

// Capture Android/Chrome install event
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const btn = document.getElementById('install-btn');
  if (btn) btn.style.display = 'flex';
  // Show banner after 2.5s
  setTimeout(showInstallBanner, 2500);
});

function showInstallBanner() {
  if (isStandalone) return;
  if (sessionStorage.getItem('pwa-dismissed')) return;
  if (document.getElementById('pwa-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'pwa-banner';
  banner.style.cssText = 'position:fixed;bottom:80px;left:12px;right:12px;background:#1c1a18;color:white;border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;z-index:999;box-shadow:0 4px 24px rgba(0,0,0,.3)';
  banner.innerHTML =
    '<img src="./icons/icon-72.png" style="width:40px;height:40px;border-radius:10px;flex-shrink:0">' +
    '<div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:700">Add to Home Screen</div>' +
    '<div style="font-size:12px;color:rgba(255,255,255,.6);margin-top:1px">Faster · works offline</div></div>' +
    (isIOS
      ? '<button onclick="showIOSGuide()" style="background:var(--pink);color:white;border:none;border-radius:10px;padding:8px 14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap">How to Install</button>'
      : '<button onclick="installPWA()" style="background:var(--pink);color:white;border:none;border-radius:10px;padding:8px 14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap">Install</button>') +
    '<button onclick="dismissBanner()" style="background:rgba(255,255,255,.15);color:white;border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center">x</button>';
  document.body.appendChild(banner);
}

function dismissBanner() {
  sessionStorage.setItem('pwa-dismissed', '1');
  const b = document.getElementById('pwa-banner');
  if (b) b.remove();
}

async function installPWA() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const {outcome} = await deferredPrompt.userChoice;
    deferredPrompt = null;
    dismissBanner();
    if (outcome === 'accepted') showToast('Installing... check your home screen');
  } else {
    showIOSGuide();
  }
}

function handleInstall() {
  if (deferredPrompt) installPWA(); else showIOSGuide();
}

function showIOSGuide() {
  document.getElementById('sheet-content').innerHTML =
    '<div style="padding:20px 20px 32px">' +
    '<div style="font-size:18px;font-weight:700;margin-bottom:4px">Add to Home Screen</div>' +
    '<div style="font-size:13px;color:var(--g400);margin-bottom:20px">Install this app to your phone</div>' +
    (isIOS
      ? '<div style="background:var(--g50);border-radius:12px;padding:16px;margin-bottom:16px;line-height:2;font-size:14px">' +
        '1. Tap the <strong>Share</strong> button ⎋ at the bottom of Safari<br>' +
        '2. Scroll and tap <strong>"Add to Home Screen"</strong><br>' +
        '3. Tap <strong>"Add"</strong> at the top right</div>'
      : '<div style="background:var(--g50);border-radius:12px;padding:16px;margin-bottom:16px;line-height:2;font-size:14px">' +
        '1. Tap the <strong>⋮ menu</strong> in Chrome<br>' +
        '2. Tap <strong>"Add to Home Screen"</strong><br>' +
        '3. Tap <strong>"Install"</strong></div>') +
    '<button onclick="closeSheet()" style="width:100%;height:50px;background:var(--pink);color:white;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer">Got it</button>' +
    '</div>';
  document.getElementById('sheet-overlay').classList.add('show');
  document.getElementById('bottom-sheet').classList.add('show');
}

window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  dismissBanner();
  const btn = document.getElementById('install-btn');
  if (btn) btn.style.display = 'none';
  showToast('App installed! Open from your home screen');
});

// iOS — always show install button (no beforeinstallprompt on Safari)
if (isIOS && !isStandalone) {
  document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('install-btn');
    if (btn) btn.style.display = 'flex';
  });
  setTimeout(showInstallBanner, 3000);
}

</script>
</body>
