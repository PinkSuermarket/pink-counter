<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Debug</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#111; color:#fff; font-family:monospace; display:flex; align-items:center; justify-content:center; width:100vw; height:100vh; }
  .box { background:#222; border:2px solid #e8446a; border-radius:16px; padding:40px; text-align:center; }
  h1 { font-size:28px; color:#e8446a; margin-bottom:20px; }
  .row { font-size:22px; margin:10px 0; }
  .val { color:#4ade80; font-weight:bold; }
</style>
</head>
<body>
<div class="box">
  <h1>📺 Screen Debug</h1>
  <div class="row">window.innerWidth: <span class="val" id="iw">—</span></div>
  <div class="row">window.innerHeight: <span class="val" id="ih">—</span></div>
  <div class="row">screen.width: <span class="val" id="sw">—</span></div>
  <div class="row">screen.height: <span class="val" id="sh">—</span></div>
  <div class="row">devicePixelRatio: <span class="val" id="dpr">—</span></div>
  <div class="row">orientation: <span class="val" id="ori">—</span></div>
  <div class="row">100vw × 100vh: <span class="val" id="vwvh">—</span></div>
</div>
<script>
  document.getElementById('iw').textContent  = window.innerWidth;
  document.getElementById('ih').textContent  = window.innerHeight;
  document.getElementById('sw').textContent  = screen.width;
  document.getElementById('sh').textContent  = screen.height;
  document.getElementById('dpr').textContent = window.devicePixelRatio;
  document.getElementById('ori').textContent = screen.orientation?.type || 'unknown';

  // measure actual vw/vh via element
  const d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;';
  document.body.appendChild(d);
  const r = d.getBoundingClientRect();
  document.getElementById('vwvh').textContent = Math.round(r.width) + ' × ' + Math.round(r.height);
  document.body.removeChild(d);
</script>
</body>
</html>
