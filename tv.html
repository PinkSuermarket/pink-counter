<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080, initial-scale=1.0">
<title>Pink Display</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #000;
    font-family: 'DM Sans', system-ui, sans-serif;
    cursor: none;
  }

  /*
    Physical TV: 1920 × 1080 landscape
    Portrait canvas: 1080 wide × 1920 tall
    
    #root sits at top-left, sized 1080 × 1920
    rotate(90deg) around top-left corner moves it off screen to the right
    translateX(1920px) OR translateY(-1080px) brings it back
    
    After rotate(90deg) from top-left:
      - old top-left  stays at (0,0)
      - old top-right goes to (0, -1080)  ← goes up
      - old bot-left  goes to (1920, 0)
    
    So we need: rotate(90deg) + shift down by 0, shift right by 0
    Wait — correct formula:
      transform: rotate(90deg) translateY(-1080px)
    This rotates 90deg CW then shifts the element up by its own height (1080)
    which places it perfectly in the 1920×1080 viewport.
  */
  #root {
    position: fixed;
    top: 0;
    left: 0;
    width: 1080px;
    height: 1920px;
    transform-origin: top left;
    transform: rotate(90deg) translateY(-1080px);
    overflow: hidden;
    background: #000;
  }

  /* All layers fill #root */
  #standby,
  #media-img,
  #media-video,
  #media-iframe,
  #fade {
    position: absolute;
    inset: 0;
    width: 1080px;
    height: 1920px;
  }

  /* ── STANDBY ── */
  #standby {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 42%, #200813 0%, #0d0d0d 60%);
    z-index: 1;
  }
  .sb-ring {
    width: 200px; height: 200px; border-radius: 50%;
    border: 5px solid #e8446a;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    animation: pulse 4s ease-in-out infinite;
    margin-bottom: 48px;
  }
  .sb-ring::before {
    content:''; position:absolute; inset:-18px; border-radius:50%;
    border:2px solid rgba(232,68,106,.2);
    animation: pulse 4s ease-in-out infinite .7s;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.04)} }
  .sb-initial { font-size:80px; font-weight:800; color:#e8446a; }
  .sb-name    { font-size:42px; font-weight:700; color:rgba(255,255,255,.75); margin-bottom:10px; }
  .sb-label   { font-size:18px; color:rgba(255,255,255,.2); letter-spacing:8px; text-transform:uppercase; }

  /* ── MEDIA ── */
  #media-img {
    object-fit: cover;
    object-position: center;
    display: none; z-index: 2;
  }
  #media-video {
    object-fit: cover;
    object-position: center;
    display: none; z-index: 2;
  }
  #media-iframe {
    border: none; display: none; z-index: 2;
  }

  /* ── FADE ── */
  #fade {
    background: #000; opacity: 0;
    transition: opacity 0.5s;
    pointer-events: none; z-index: 50;
  }
  #fade.on { opacity: 1; }

  /* ── LABEL ── */
  #content-label {
    position: absolute; top: 32px; left: 50%;
    transform: translateX(-50%);
    background: rgba(232,68,106,.92); color: #fff;
    font-size: 22px; font-weight: 700;
    padding: 10px 32px; border-radius: 50px;
    z-index: 60; opacity: 0; transition: opacity 0.4s;
    white-space: nowrap; max-width: 900px;
    overflow: hidden; text-overflow: ellipsis;
    pointer-events: none;
  }
  #content-label.show { opacity: 1; }

  /* ── STATUS BAR ── */
  #statusbar {
    position: absolute; bottom: 0; left: 0;
    width: 1080px; height: 52px;
    background: rgba(0,0,0,.9);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; z-index: 60;
    opacity: 0; transition: opacity 0.5s;
  }
  #statusbar.show { opacity: 1; }
  .sb-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #e8446a; flex-shrink: 0; margin-right: 12px;
    animation: blink 2s ease-in-out infinite;
  }
  .sb-dot.live  { background: #22c55e; animation: none; }
  .sb-dot.error { background: #ef4444; animation: none; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }
  #sb-msg  { font-size: 18px; color: rgba(255,255,255,.4); flex: 1; }
  #sb-time { font-size: 18px; color: rgba(255,255,255,.2); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div id="root">
  <div id="standby">
    <div class="sb-ring"><span class="sb-initial">P</span></div>
    <div class="sb-name">Pink Supermarket</div>
    <div class="sb-label">Display · Ready</div>
  </div>

  <img   id="media-img" alt="">
  <video id="media-video" autoplay muted loop playsinline></video>
  <iframe id="media-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>

  <div id="fade"></div>
  <div id="content-label"></div>

  <div id="statusbar">
    <span class="sb-dot" id="sb-dot"></span>
    <span id="sb-msg">Connecting…</span>
    <span id="sb-time"></span>
  </div>
</div>

<script>
const SUPABASE_URL  = 'https://gllmdqytlgcozrpsusvt.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsbG1kcXl0bGdjb3pycHN1c3Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5ODE1ODIsImV4cCI6MjA4NzU1NzU4Mn0.VDOsR8-8VRcXZ5wxUMS5u6FrT1WwcUT-LtKcAYztGZM';
const POLL_MS = 5000;

let currentId = null, sbTimer = null, lblTimer = null;
const fadeEl    = document.getElementById('fade');
const standby   = document.getElementById('standby');
const imgEl     = document.getElementById('media-img');
const videoEl   = document.getElementById('media-video');
const ifrEl     = document.getElementById('media-iframe');
const statusbar = document.getElementById('statusbar');
const dotEl     = document.getElementById('sb-dot');
const msgEl     = document.getElementById('sb-msg');
const lblEl     = document.getElementById('content-label');

setInterval(() => {
  document.getElementById('sb-time').textContent =
    new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}, 1000);

function showStatus(msg, type) {
  dotEl.className = 'sb-dot ' + (type || '');
  msgEl.textContent = msg;
  statusbar.classList.add('show');
  clearTimeout(sbTimer);
  sbTimer = setTimeout(() => statusbar.classList.remove('show'), 5000);
}

function flashLabel(text) {
  lblEl.textContent = text;
  lblEl.classList.add('show');
  clearTimeout(lblTimer);
  lblTimer = setTimeout(() => lblEl.classList.remove('show'), 3500);
}

function hideAll() {
  standby.style.display = 'none';
  imgEl.style.display   = 'none';
  videoEl.style.display = 'none';
  ifrEl.style.display   = 'none';
}

function showStandby() { hideAll(); standby.style.display = 'flex'; }

async function crossfade(fn) {
  fadeEl.classList.add('on');
  await new Promise(r => setTimeout(r, 500));
  fn();
  await new Promise(r => setTimeout(r, 60));
  fadeEl.classList.remove('on');
}

function render(row) {
  if (row.id === currentId) return;
  currentId = row.id;
  crossfade(() => {
    hideAll();
    if      (row.type === 'image') { imgEl.src  = row.url; imgEl.style.display  = 'block'; }
    else if (row.type === 'video') { videoEl.src = row.url; videoEl.style.display = 'block'; videoEl.play().catch(()=>{}); }
    else if (row.type === 'html')  { ifrEl.src  = row.url; ifrEl.style.display  = 'block'; }
    const name = row.label || row.url.split('/').pop().split('?')[0] || row.type;
    showStatus(name + ' · now playing', 'live');
    flashLabel(row.label || name);
  });
}

async function poll() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/tv_content?select=*&is_active=eq.true&order=pushed_at.desc&limit=1`,
      { headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` } }
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    if (rows.length) render(rows[0]);
    else if (!currentId) showStandby();
  } catch(e) {
    showStatus('Connection error — retrying', 'error');
  }
}

showStandby();
poll();
setInterval(poll, POLL_MS);
</script>
</body>
</html>
