<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Display</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000;
    font-family: 'DM Sans', system-ui, sans-serif;
    cursor: none;
  }

  /*
    Viewport = 962 × 541 (landscape)
    We want portrait = 541 × 962
    
    Step 1: #root is 541px wide × 962px tall (portrait size)
    Step 2: rotate(90deg) — pivots around top-left corner
            After rotation, top-left stays at (0,0)
            The element now occupies x:[0..962], y:[-541..0]
            (it went UP above the viewport)
    Step 3: translateX(0) translateY(541px) — shift it DOWN back into view
            OR use: rotate(90deg) translateX(0) translateY(-541px) 
            
    Correct transform: rotate(90deg) translateY(-100%)
    where 100% = height of #root = 962px... NO
    
    Actually the cleanest:
    - translate AFTER rotate in the element's NEW coordinate system
    - After rotate(90deg), the element's Y axis points LEFT on screen
    - translateY(-100%) moves it 962px in that direction = 962px LEFT
    
    SIMPLEST WORKING APPROACH:
    Don't rotate. Instead use writing-mode or just use JS to set exact px.
  */

  /* No rotation tricks — use JS to set exact dimensions after measuring */
  #root {
    position: fixed;
    top: 0; left: 0;
    transform-origin: 0 0;
    overflow: hidden;
    background: #000;
  }

  #standby,
  #media-img,
  #media-video,
  #media-iframe,
  #fade {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }

  #standby {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 50% 42%, #200813 0%, #0d0d0d 60%);
    z-index: 1;
  }
  .sb-ring {
    width: 120px; height: 120px; border-radius: 50%;
    border: 4px solid #e8446a;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    animation: pulse 4s ease-in-out infinite;
    margin-bottom: 28px;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.04)} }
  .sb-initial { font-size: 48px; font-weight: 800; color: #e8446a; }
  .sb-name    { font-size: 22px; font-weight: 700; color: rgba(255,255,255,.75); margin-bottom: 8px; }
  .sb-label   { font-size: 11px; color: rgba(255,255,255,.2); letter-spacing: 5px; text-transform: uppercase; }

  #media-img   { object-fit: cover; object-position: center; display: none; z-index: 2; }
  #media-video { object-fit: cover; object-position: center; display: none; z-index: 2; }
  #media-iframe{ border: none; display: none; z-index: 2; }

  #fade {
    background: #000; opacity: 0;
    transition: opacity 0.5s; pointer-events: none; z-index: 50;
  }
  #fade.on { opacity: 1; }

  #content-label {
    position: absolute; top: 16px; left: 50%;
    transform: translateX(-50%);
    background: rgba(232,68,106,.92); color: #fff;
    font-size: 13px; font-weight: 700;
    padding: 6px 20px; border-radius: 50px;
    z-index: 60; opacity: 0; transition: opacity 0.4s;
    white-space: nowrap; max-width: 80%;
    overflow: hidden; text-overflow: ellipsis; pointer-events: none;
  }
  #content-label.show { opacity: 1; }

  #statusbar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 36px;
    background: rgba(0,0,0,.88);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; z-index: 60;
    opacity: 0; transition: opacity 0.5s;
  }
  #statusbar.show { opacity: 1; }
  .sb-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #e8446a; flex-shrink: 0; margin-right: 8px;
    animation: blink 2s ease-in-out infinite;
  }
  .sb-dot.live  { background: #22c55e; animation: none; }
  .sb-dot.error { background: #ef4444; animation: none; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }
  #sb-msg  { font-size: 11px; color: rgba(255,255,255,.45); flex: 1; }
  #sb-time { font-size: 11px; color: rgba(255,255,255,.2); }
</style>
</head>
<body>
<div id="root">
  <div id="standby">
    <div class="sb-ring"><span class="sb-initial">P</span></div>
    <div class="sb-name">Pink Supermarket</div>
    <div class="sb-label">Display · Ready</div>
  </div>
  <img   id="media-img" alt="">
  <video id="media-video" autoplay muted loop playsinline></video>
  <iframe id="media-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
  <div id="fade"></div>
  <div id="content-label"></div>
  <div id="statusbar">
    <span class="sb-dot" id="sb-dot"></span>
    <span id="sb-msg">Connecting…</span>
    <span id="sb-time"></span>
  </div>
</div>

<script>
// ── PORTRAIT ROTATION via JS (uses exact measured pixels) ──────────────────
function applyPortrait() {
  const W = window.innerWidth;   // landscape width  e.g. 962
  const H = window.innerHeight;  // landscape height e.g. 541
  const root = document.getElementById('root');

  // Portrait: width=H, height=W  (e.g. 541 × 962)
  root.style.width  = H + 'px';
  root.style.height = W + 'px';

  // Rotate 90° CW around top-left, then shift right by H px
  // so the rotated box sits exactly in the viewport top-left corner
  root.style.transform = `rotate(90deg) translateY(-${H}px)`;
}

applyPortrait();
window.addEventListener('resize', applyPortrait);

// ── SUPABASE POLL ──────────────────────────────────────────────────────────
const SUPABASE_URL  = 'https://gllmdqytlgcozrpsusvt.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsbG1kcXl0bGdjb3pycHN1c3Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5ODE1ODIsImV4cCI6MjA4NzU1NzU4Mn0.VDOsR8-8VRcXZ5wxUMS5u6FrT1WwcUT-LtKcAYztGZM';
const POLL_MS = 5000;

let currentId = null, sbTimer = null, lblTimer = null;
const fadeEl    = document.getElementById('fade');
const standby   = document.getElementById('standby');
const imgEl     = document.getElementById('media-img');
const videoEl   = document.getElementById('media-video');
const ifrEl     = document.getElementById('media-iframe');
const statusbar = document.getElementById('statusbar');
const dotEl     = document.getElementById('sb-dot');
const msgEl     = document.getElementById('sb-msg');
const lblEl     = document.getElementById('content-label');

setInterval(() => {
  document.getElementById('sb-time').textContent =
    new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}, 1000);

function showStatus(msg, type) {
  dotEl.className = 'sb-dot ' + (type || '');
  msgEl.textContent = msg;
  statusbar.classList.add('show');
  clearTimeout(sbTimer);
  sbTimer = setTimeout(() => statusbar.classList.remove('show'), 5000);
}

function flashLabel(text) {
  lblEl.textContent = text;
  lblEl.classList.add('show');
  clearTimeout(lblTimer);
  lblTimer = setTimeout(() => lblEl.classList.remove('show'), 3500);
}

function hideAll() {
  standby.style.display = 'none';
  imgEl.style.display   = 'none';
  videoEl.style.display = 'none';
  ifrEl.style.display   = 'none';
}

function showStandby() { hideAll(); standby.style.display = 'flex'; }

async function crossfade(fn) {
  fadeEl.classList.add('on');
  await new Promise(r => setTimeout(r, 500));
  fn();
  await new Promise(r => setTimeout(r, 60));
  fadeEl.classList.remove('on');
}

function render(row) {
  if (row.id === currentId) return;
  currentId = row.id;
  crossfade(() => {
    hideAll();
    if      (row.type === 'image') { imgEl.src   = row.url; imgEl.style.display   = 'block'; }
    else if (row.type === 'video') { videoEl.src  = row.url; videoEl.style.display  = 'block'; videoEl.play().catch(()=>{}); }
    else if (row.type === 'html')  { ifrEl.src   = row.url; ifrEl.style.display   = 'block'; }
    const name = row.label || row.url.split('/').pop().split('?')[0] || row.type;
    showStatus(name + ' · now playing', 'live');
    flashLabel(row.label || name);
  });
}

async function poll() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/tv_content?select=*&is_active=eq.true&order=pushed_at.desc&limit=1`,
      { headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` } }
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    if (rows.length) render(rows[0]);
    else if (!currentId) showStandby();
  } catch(e) {
    showStatus('Connection error — retrying', 'error');
  }
}

showStandby();
poll();
setInterval(poll, POLL_MS);
</script>
</body>
</html>
