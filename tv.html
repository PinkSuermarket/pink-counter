<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Size Debug</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #000;
    color: #fff;
    font-family: monospace;
    font-size: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
  }
  .box {
    background: #111;
    border: 3px solid #e8446a;
    border-radius: 20px;
    padding: 40px 60px;
    text-align: center;
    line-height: 2;
  }
  span { color: #4ade80; font-size: 36px; font-weight: bold; }
</style>
</head>
<body>
<div class="box">
  <div>innerWidth: <span id="w">—</span></div>
  <div>innerHeight: <span id="h">—</span></div>
  <div>Portrait would be:</div>
  <div>W=<span id="pw">—</span> H=<span id="ph">—</span></div>
</div>
<script>
  document.getElementById('w').textContent  = window.innerWidth;
  document.getElementById('h').textContent  = window.innerHeight;
  document.getElementById('pw').textContent = window.innerHeight;
  document.getElementById('ph').textContent = window.innerWidth;
</script>
</body>
</html>
